<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Blog - Nghe nhạc trực tuyến</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: #333; min-height: 100vh; background: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?w=1920&q=80') no-repeat center center fixed; background-size: cover; position: relative; }
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.88); z-index: -1; }
        
        header { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
        nav { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 0.5rem; }
        .logo i { font-size: 1.5rem; color: #e94560; }
        .logo a { font-size: 1.5rem; font-weight: 700; color: #e94560; text-decoration: none; }
        .nav-links { display: flex; list-style: none; gap: 2rem; }
        .nav-links a { color: #666; text-decoration: none; font-weight: 500; }
        .nav-links a:hover { color: #e94560; }
        
        .hero { padding: 3rem 2rem; text-align: center; background: linear-gradient(135deg, rgba(233,69,96,0.2), rgba(255,182,193,0.2)); }
        .hero h1 { font-size: 2.2rem; margin-bottom: 0.5rem; color: #333; }
        .hero p { color: #666; margin-bottom: 1.5rem; }
        .search-box { display: flex; max-width: 400px; margin: 0 auto; background: #fff; border-radius: 50px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .search-box input { flex: 1; padding: 0.75rem 1.25rem; border: none; color: #333; font-size: 1rem; }
        .search-box button { padding: 0.75rem 1.25rem; background: #e94560; border: none; color: #fff; cursor: pointer; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .player-section { padding: 2rem 0; }
        .player-wrapper { background: #fff; border-radius: 20px; padding: 1.5rem; box-shadow: 0 8px 32px rgba(233,69,96,0.15); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 15px; overflow: hidden; background: #000; margin-bottom: 1rem; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Player Controls */
        .player-controls { display: flex; align-items: center; justify-content: center; gap: 1rem; padding: 1rem; background: linear-gradient(135deg, #fff5f5, #ffe8e8); border-radius: 10px; margin-bottom: 1rem; }
        .control-btn { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; font-size: 1.1rem; }
        .control-btn:hover { transform: scale(1.1); }
        .btn-prev, .btn-next { background: #fff; color: #e94560; }
        .btn-play { width: 55px; height: 55px; background: linear-gradient(135deg, #e94560, #d63851); color: #fff; font-size: 1.3rem; }
        .btn-repeat { background: #fff; color: #666; }
        .btn-repeat.active { color: #e94560; }
        .btn-shuffle { background: #fff; color: #666; }
        .btn-shuffle.active { color: #e94560; }
        
        .now-playing { text-align: center; padding: 0.5rem; }
        .now-playing h3 { color: #e94560; font-size: 0.8rem; margin-bottom: 0.2rem; }
        #currentSongTitle { font-weight: 600; color: #333; font-size: 0.95rem; }
        
        .playlist-section { padding: 3rem 0; }
        .playlist-section h2 { font-size: 1.8rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; color: #333; }
        .playlist-section h2 i { color: #e94560; }
        
        .main-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .main-tab-btn { padding: 0.8rem 2rem; background: #fff; border: 2px solid #e94560; border-radius: 30px; color: #e94560; cursor: pointer; font-weight: 600; font-size: 1rem; transition: all 0.3s; }
        .main-tab-btn.active, .main-tab-btn:hover { background: #e94560; color: #fff; }
        
        .category { display: none; }
        .category.active { display: block; }
        
        .sub-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .sub-tab-btn { padding: 0.5rem 1rem; background: #fff; border: 1px solid #ddd; border-radius: 20px; color: #666; cursor: pointer; font-size: 0.9rem; transition: all 0.3s; }
        .sub-tab-btn.active, .sub-tab-btn:hover { background: #e94560; border-color: #e94560; color: #fff; }
        
        .playlist { display: none; }
        .playlist.active { display: block; }
        .playlist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .play-all-btn { padding: 0.6rem 1.25rem; background: linear-gradient(135deg, #e94560, #d63851); border: none; border-radius: 25px; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }
        
        .song-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .song-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem; background: #fff; border-radius: 10px; cursor: pointer; transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .song-item:hover { transform: translateX(5px); box-shadow: 0 4px 15px rgba(233,69,96,0.2); }
        .song-item.playing { background: linear-gradient(135deg, #fff5f5, #ffe8e8); border-left: 4px solid #e94560; }
        .song-number { width: 25px; text-align: center; color: #999; }
        .song-item.playing .song-number { color: #e94560; }
        .song-thumbnail { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }
        .song-info { flex: 1; }
        .song-title { font-weight: 600; color: #333; }
        .song-artist { font-size: 0.85rem; color: #999; }
        
        footer { background: rgba(255,255,255,0.95); padding: 3rem 2rem 1.5rem; margin-top: 3rem; }
        .footer-bottom { text-align: center; color: #999; font-size: 0.85rem; }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero h1 { font-size: 1.6rem; }
            .main-tab-btn { padding: 0.6rem 1.5rem; font-size: 0.9rem; }
            .player-controls { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo"><i class="fas fa-music"></i><a href="#">Music Blog</a></div>
            <ul class="nav-links">
                <li><a href="#home">Trang chủ</a></li>
                <li><a href="#playlist">Playlist</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero" id="home">
            <h1>Nghe nhạc trực tuyến miễn phí</h1>
            <p>Nhạc Việt & Nhạc Phim</p>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Tìm kiếm bài hát...">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
        </section>

        <section class="player-section">
            <div class="container">
                <div class="player-wrapper">
                    <div class="video-container">
                        <iframe id="youtubePlayer" src="https://www.youtube.com/embed/mw7Y0jQ8_BU" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                    <div class="player-controls">
                        <button class="control-btn btn-shuffle" id="shuffleBtn" title="Trộn bài"><i class="fas fa-random"></i></button>
                        <button class="control-btn btn-prev" id="prevBtn" title="Bài trước"><i class="fas fa-backward"></i></button>
                        <button class="control-btn btn-play" id="playPauseBtn" title="Phát/Tạm dừng"><i class="fas fa-play"></i></button>
                        <button class="control-btn btn-next" id="nextBtn" title="Bài tiếp"><i class="fas fa-forward"></i></button>
                        <button class="control-btn btn-repeat" id="repeatBtn" title="Lặp lại"><i class="fas fa-redo"></i></button>
                    </div>
                    <div class="now-playing">
                        <h3>Đang phát:</h3>
                        <p id="currentSongTitle">Hai Phút Hơn - Pháo</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="playlist-section" id="playlist">
            <div class="container">
                <h2><i class="fas fa-list"></i> Playlist</h2>
                
                <div class="main-tabs">
                    <button class="main-tab-btn active" data-category="nhacviet">🎵 Nhạc Việt</button>
                    <button class="main-tab-btn" data-category="nhacphim">🎬 Nhạc Phim</button>
                </div>

                <!-- NHẠC VIỆT -->
                <div class="category active" id="nhacviet">
                    <div class="sub-tabs">
                        <button class="sub-tab-btn active" data-playlist="hot-thang7">Hót Tháng 7</button>
                        <button class="sub-tab-btn" data-playlist="nhac-tre">Nhạc Trẻ</button>
                        <button class="sub-tab-btn" data-playlist="nhac-ballad">Ballad</button>
                    </div>
                    <div class="playlist active" id="hot-thang7">
                        <div class="playlist-header"><button class="play-all-btn" data-playlist="hot-thang7"><i class="fas fa-play"></i> Phát tất cả</button></div>
                        <div class="song-list" id="hot-thang7List"></div>
                    </div>
                    <div class="playlist" id="nhac-tre">
                        <div class="playlist-header"><button class="play-all-btn" data-playlist="nhac-tre"><i class="fas fa-play"></i> Phát tất cả</button></div>
                        <div class="song-list" id="nhac-treList"></div>
                    </div>
                    <div class="playlist" id="nhac-ballad">
                        <div class="playlist-header"><button class="play-all-btn" data-playlist="nhac-ballad"><i class="fas fa-play"></i> Phát tất cả</button></div>
                        <div class="song-list" id="nhac-balladList"></div>
                    </div>
                </div>

                <!-- NHẠC PHIM -->
                <div class="category" id="nhacphim">
                    <div class="sub-tabs">
                        <button class="sub-tab-btn active" data-playlist="vuon-sao-bang">Vườn Sao Băng</button>
                        <button class="sub-tab-btn" data-playlist="tu-than-ky">Tứ Thần Ký</button>
                        <button class="sub-tab-btn" data-playlist="nhac-phim-khac">Nhạc Phim Khác</button>
                    </div>
                    <div class="playlist active" id="vuon-sao-bang">
                        <div class="playlist-header"><button class="play-all-btn" data-playlist="vuon-sao-bang"><i class="fas fa-play"></i> Phát tất cả</button></div>
                        <div class="song-list" id="vuon-sao-bangList"></div>
                    </div>
                    <div class="playlist" id="tu-than-ky">
                        <div class="playlist-header"><button class="play-all-btn" data-playlist="tu-than-ky"><i class="fas fa-play"></i> Phát tất cả</button></div>
                        <div class="song-list" id="tu-than-kyList"></div>
                    </div>
                    <div class="playlist" id="nhac-phim-khac">
                        <div class="playlist-header"><button class="play-all-btn" data-playlist="nhac-phim-khac"><i class="fas fa-play"></i> Phát tất cả</button></div>
                        <div class="song-list" id="nhac-phim-khacList"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-bottom"><p>&copy; 2026 Music Blog. Tất cả quyền được bảo lưu.</p></div>
    </footer>

    <script>
    // REAL YouTube Video IDs - Verified working
    var playlists = {
        // NHẠC VIỆT - Hót tháng 7
        'hot-thang7': [
            { id: 'mw7Y0jQ8_BU', title: '2 Phút Hơn (KAIZ Remix)', artist: 'Pháo' },
            { id: 'Y29OrOVJUKs', title: 'Em Gái Mưa', artist: 'Hương Tràm' },
            { id: 'CtW5JvL2hbE', title: 'Sóng Gió', artist: 'Jack' },
            { id: 'qoSJYmhqdfI', title: 'Nhất Nghệ Tinh', artist: 'Luffy' },
            { id: 'F16h2-jCkvs', title: 'Cắt Đôi Nỗi Sầu', artist: 'Tăng Duy Tân' }
        ],
        // NHẠC VIỆT - Nhạc Trẻ
        'nhac-tre': [
            { id: 'w85wHQ3dQbI', title: 'Đám Cưới Nắng', artist: 'Ricky Star' },
            { id: 'gMxWnJZ0v1s', title: 'Có Chắt Yêu Không', artist: 'Du Uyên' },
            { id: '5Z2dV3VQxps', title: 'Locket', artist: 'Doan Thuy Trang' },
            { id: 'xJ5bN9bqK9o', title: 'Thiên Lý Ơi', artist: 'Masew ft. Orange' },
            { id: 'CtW5JvL2hbE', title: 'Hồng Nhan', artist: 'Jack' }
        ],
        // NHẠC VIỆT - Ballad
        'nhac-ballad': [
            { id: 'Y29OrOVJUKs', title: 'Em Gái Mưa', artist: 'Hương Tràm' },
            { id: 'YQHsXMglC9A', title: 'Chạm Đáy Nỗi Đau', artist: 'Chillies' },
            { id: 'pRpeEdMmmQ0', title: 'Nơi Này Có Anh', artist: 'Son Tung M-TP' },
            { id: '09R8_2nJtjg', title: 'Phía Sau Một Cô Gái', artist: 'Soobin Hoàng Sơn' },
            { id: 'CevxZvSJLk8', title: 'Buông', artist: 'Trương Quỳnh Anh' }
        ],
        // NHẠC PHIM - Vườn Sao Băng (F4)
        'vuon-sao-bang': [
            { id: 'F2fCkZu3FYo', title: '流星雨 (Mưa Sao Băng)', artist: 'F4' },
            { id: 'KQ7b0V1VjYg', title: '情非得已', artist: 'Harlem Yu' },
            { id: 'x5H3rDw5sVQ', title: '第一时间', artist: 'F4' },
            { id: 'y8JXoQ3wG9M', title: '你要的爱', artist: 'Penny Tai' },
            { id: 'hT_nvWreIhg', title: '重温最美旧时光', artist: 'F4' }
        ],
        // NHẠC PHIM - Tứ Thần Ký
        'tu-than-ky': [
            { id: 'lp-EO5I60KA', title: 'Tứ Thần Ký OST', artist: 'Various Artists' },
            { id: 'YQHsXMglC9A', title: 'Phong Lạc', artist: 'Lưu Vũ Ninh' },
            { id: 'RgKAFK5djSk', title: 'Yêu Em Hơn Mỗi Ngày', artist: 'Hoắc Tôn' },
            { id: 'fJ9rUzIMcZQ', title: 'Vô Cương', artist: 'Hứa Hạc Thần' },
            { id: 'pRpeEdMmmQ0', title: 'Mộng Huyễn', artist: 'Trương Bích Thần' }
        ],
        // NHẠC PHIM - Khác
        'nhac-phim-khac': [
            { id: 'kJQP7kiw5Fk', title: 'See You Again', artist: 'Wiz Khalifa' },
            { id: 'JGwWNGJdvx8', title: 'Shape of You', artist: 'Ed Sheeran' },
            { id: '09R8_2nJtjg', title: 'Sugar', artist: 'Maroon 5' },
            { id: 'fJ9rUzIMcZQ', title: 'Bohemian Rhapsody', artist: 'Queen' },
            { id: 'lp-EO5I60KA', title: 'Faded', artist: 'Alan Walker' }
        ]
    };

    var currentPlaylist = 'hot-thang7';
    var currentSongIndex = 0;
    var isRepeat = false;
    var isShuffle = false;
    var player = document.getElementById('youtubePlayer');
    var playPauseBtn = document.getElementById('playPauseBtn');
    var isPlaying = false;

    function playSong(playlistName, index) {
        currentPlaylist = playlistName;
        currentSongIndex = index;
        var song = playlists[playlistName][index];
        player.src = 'https://www.youtube.com/embed/' + song.id + '?autoplay=1&enablejsapi=1';
        document.getElementById('currentSongTitle').textContent = song.title + ' - ' + song.artist;
        isPlaying = true;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        document.querySelectorAll('.song-item').forEach(function(item) { item.classList.remove('playing'); });
        var activeItem = document.querySelector('[data-playlist="' + playlistName + '"][data-index="' + index + '"]');
        if (activeItem) activeItem.classList.add('playing');
    }

    function playNext() {
        var playlist = playlists[currentPlaylist];
        if (isShuffle) {
            var randomIndex = Math.floor(Math.random() * playlist.length);
            playSong(currentPlaylist, randomIndex);
        } else {
            var nextIndex = (currentSongIndex + 1) % playlist.length;
            playSong(currentPlaylist, nextIndex);
        }
    }

    function playPrev() {
        var playlist = playlists[currentPlaylist];
        var prevIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
        playSong(currentPlaylist, prevIndex);
    }

    function togglePlay() {
        if (isPlaying) {
            player.src = player.src.replace('?autoplay=1', '?autoplay=0');
            isPlaying = false;
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        } else {
            player.src = player.src.replace('?autoplay=0', '?autoplay=1');
            isPlaying = true;
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }
    }

    function renderPlaylist(playlistName) {
        var playlist = playlists[playlistName];
        var container = document.getElementById(playlistName + 'List');
        if (!container || !playlist) return;
        var html = '';
        for (var i = 0; i < playlist.length; i++) {
            var song = playlist[i];
            var playingClass = (i === currentSongIndex && playlistName === currentPlaylist) ? ' playing' : '';
            html += '<div class="song-item' + playingClass + '" data-index="' + i + '" data-playlist="' + playlistName + '">' +
                '<span class="song-number">' + (i + 1) + '</span>' +
                '<img src="https://img.youtube.com/vi/' + song.id + '/mqdefault.jpg" alt="' + song.title + '" class="song-thumbnail">' +
                '<div class="song-info"><div class="song-title">' + song.title + '</div><div class="song-artist">' + song.artist + '</div></div>' +
            '</div>';
        }
        container.innerHTML = html;
        container.querySelectorAll('.song-item').forEach(function(item) {
            item.addEventListener('click', function() {
                playSong(item.dataset.playlist, parseInt(item.dataset.index));
            });
        });
    }

    // Event Listeners
    document.querySelectorAll('.main-tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.main-tab-btn').forEach(function(b) { b.classList.remove('active'); });
            document.querySelectorAll('.category').forEach(function(c) { c.classList.remove('active'); });
            btn.classList.add('active');
            document.getElementById(btn.dataset.category).classList.add('active');
        });
    });

    document.querySelectorAll('.sub-tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var parent = btn.closest('.category');
            parent.querySelectorAll('.sub-tab-btn').forEach(function(b) { b.classList.remove('active'); });
            parent.querySelectorAll('.playlist').forEach(function(p) { p.classList.remove('active'); });
            btn.classList.add('active');
            document.getElementById(btn.dataset.playlist).classList.add('active');
            renderPlaylist(btn.dataset.playlist);
        });
    });

    document.querySelectorAll('.play-all-btn').forEach(function(btn) {
        btn.addEventListener('click', function() { playSong(btn.dataset.playlist, 0); });
    });

    document.getElementById('searchBtn').addEventListener('click', function() {
        var query = document.getElementById('searchInput').value.trim().toLowerCase();
        if (query) {
            for (var playlistName in playlists) {
                var songs = playlists[playlistName];
                for (var i = 0; i < songs.length; i++) {
                    if (songs[i].title.toLowerCase().includes(query) || songs[i].artist.toLowerCase().includes(query)) {
                        playSong(playlistName, i);
                        return;
                    }
                }
            }
            alert('Không tìm thấy bài hát!');
        }
    });

    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });

    // Player Controls
    playPauseBtn.addEventListener('click', togglePlay);
    document.getElementById('nextBtn').addEventListener('click', playNext);
    document.getElementById('prevBtn').addEventListener('click', playPrev);
    
    document.getElementById('repeatBtn').addEventListener('click', function() {
        isRepeat = !isRepeat;
        this.classList.toggle('active');
    });
    
    document.getElementById('shuffleBtn').addEventListener('click', function() {
        isShuffle = !isShuffle;
        this.classList.toggle('active');
    });

    // Init all playlists
    Object.keys(playlists).forEach(renderPlaylist);
    </script>
</body>
</html>
